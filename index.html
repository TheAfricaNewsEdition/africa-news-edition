<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- ===================================================================
     SITE TITLE (shown in the browser tab)
     Change the text between the <title> tags below.
     =================================================================== -->
<title>THE AFRICA NEWS EDITION</title>

<!-- Georgia is built into every system, so no web fonts needed. -->


<script>
/* =====================================================================
   ★  EDITABLE WEBSITE SETTINGS  ★
   ---------------------------------------------------------------------
   This is the ONLY part of the file you need to edit.
   Change the text inside the quotes "  ".
   Do NOT remove the commas or the quote marks.
   ===================================================================== */

window.SITE = {

  // The name of your website (shown big at the top)
  name: "THE AFRICA NEWS EDITION",

  // A short tagline shown under the name
  description: "The Africa Edition: News That Matters to Africa - Overlooked and Misunderstood©️",

  // Short letters shown in the round logo (1–3 letters work best)
  initials: "AF",

  // The big welcome paragraph on the homepage
  intro: "The Africa News Edition is the only curated platform that brings together top stories from all five regions of the continent — East, West, Central, Southern, and North Africa.",

  // The text labels in the top menu
  menu: {
    home:     "Home",
  },

  // The little message at the bottom of every page
  footer: "©The Africa Edition: News That Matters to Africa - Overlooked and Misunderstood©️"

};

/* =====================================================================
   ★  WHERE IS THE LIST OF NEWS STORIES?  ★
   ---------------------------------------------------------------------
   To keep this file tidy, the list of news posts lives in its own file:

       posts.js   (in the same folder as this index.html)

   That is where you add new stories.

   ★  HOW TO ADD A NEW STORY  ★

   Each news file is its OWN web page. It opens at its own URL:
       /news/<your-filename>.html

   The homepage does NOT add a header, footer, or any styling around it.
   Whatever HTML is in the file is exactly what readers see. So your
   article files should be complete HTML pages with their own title,
   header, and styling.

   Step 1.  Drop your HTML file into the "news" folder.
            Use a simple filename: lowercase letters, numbers, dashes.
            No spaces, no special characters.
            Good:  my-new-story.html
            Bad:   My New Story!.html
   Step 2.  Open "posts.js" and add a new block at the top of the list.
            Put your new filename on the "file:" line.
   Step 3.  Save. Done.

   ★  HOW TO PUBLISH YOUR CHANGES  ★

   If your site is on GitHub Pages:
     • Open your repository on github.com
     • Click "Add file" → "Upload files"
     • Drop in the changed files (posts.js and/or files in news/)
     • Write a short message like "added new story" and click
       "Commit changes"
     • Wait ~1 minute. Your site updates automatically.
   ===================================================================== */
</script>

<!-- Loads the news posts from posts.js. Edit posts.js to add stories. -->
<script src="posts.js"></script>

<style>
/* ========================================================
   Palette + type lifted from the example news article so
   the homepage and every story feel like one publication.
   ======================================================== */
:root {
  --bg:           #f5f1e8;
  --bg-2:         #f9f7f3;
  --card:         #ffffff;
  --navy:         #1e3a5f;
  --blue:         #2c5282;
  --gold:         #c9a961;
  --gold-soft:    #e0d5c7;
  --text:         #2c3e50;
  --text-soft:    #4a5a6f;
  --muted:        #888;
  --rule:         #e0d5c7;
  --shadow:       0 10px 50px rgba(0, 0, 0, 0.12);
  --shadow-soft:  0 4px 20px rgba(30, 58, 95, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 18px;
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px 60px;
}

.container {
  background: var(--card);
  box-shadow: var(--shadow);
  min-height: 90vh;
  overflow: hidden;
}

/* ===================== MASTHEAD ===================== */
.masthead {
  background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 50%, var(--gold) 100%);
  padding: 56px 40px 50px;
  text-align: center;
  color: #fff;
  border-bottom: 6px solid var(--gold);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
  position: relative;
}
.masthead-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.85;
  margin-bottom: 28px;
}
.masthead-top .edition { display: flex; gap: 18px; }
.masthead-top .edition span { display: inline-block; }

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px;
  height: 64px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 18px;
  background: rgba(255, 255, 255, 0.08);
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.masthead h1 {
  font-size: clamp(28px, 5vw, 48px);
  letter-spacing: 4px;
  font-weight: normal;
  margin-bottom: 14px;
  text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
  text-transform: uppercase;
}
.masthead .tagline {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  opacity: 0.92;
  font-weight: 300;
}

/* ===================== NAV ===================== */
nav.primary {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  background: var(--card);
  border-bottom: 1px solid var(--rule);
  padding: 0;
}
nav.primary a {
  padding: 18px 28px;
  font-size: 13px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--navy);
  cursor: pointer;
  position: relative;
  transition: color 0.2s ease;
}
nav.primary a + a::before {
  content: "";
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 1px;
  height: 16px;
  background: var(--rule);
}
nav.primary a::after {
  content: "";
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--gold);
  transition: width 0.25s ease;
}
nav.primary a:hover { color: var(--blue); }
nav.primary a:hover::after { width: 26px; }

/* ===================== INTRO ===================== */
.intro {
  padding: 60px 60px 40px;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 40px;
  align-items: start;
  border-bottom: 1px solid var(--rule);
}
.intro .label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: bold;
  padding-top: 14px;
  border-top: 3px solid var(--navy);
}
.intro p {
  font-style: italic;
  font-size: clamp(22px, 2.2vw, 30px);
  line-height: 1.45;
  color: var(--navy);
}

/* ===================== SECTION BAR ===================== */
.section-bar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding: 40px 60px 18px;
  border-bottom: 1px solid var(--rule);
}
.section-bar h2 {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: bold;
  color: var(--navy);
  position: relative;
  padding-left: 22px;
}
.section-bar h2::before {
  content: "";
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 14px;
  height: 2px;
  background: var(--gold);
}
.section-bar .meta {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ===================== FEATURED ===================== */
.featured {
  padding: 48px 60px 56px;
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 56px;
  align-items: center;
  border-bottom: 6px solid var(--gold);
  cursor: pointer;
  background: linear-gradient(180deg, #fff 0%, #fcfaf5 100%);
  color: inherit;
  text-decoration: none;
}
.featured .stamp {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: bold;
  padding: 6px 14px;
  border: 1.5px solid var(--gold);
  margin-bottom: 22px;
}
.featured .cat {
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.featured h3 {
  font-size: clamp(32px, 4vw, 48px);
  line-height: 1.1;
  letter-spacing: -0.5px;
  color: var(--navy);
  margin-bottom: 20px;
  font-weight: normal;
}
.featured:hover h3 { color: var(--blue); }
.featured .excerpt {
  font-size: 19px;
  color: var(--text-soft);
  margin-bottom: 26px;
  font-style: italic;
  max-width: 50ch;
}
.featured .read {
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--navy);
  font-weight: bold;
  border-bottom: 2px solid var(--gold);
  padding-bottom: 4px;
  display: inline-block;
}
.featured-art {
  aspect-ratio: 4 / 5;
  background: url("https://www.whatarethe7continents.com/wp-content/uploads/2011/12/continent-africa.png");
  background-size: contain;
  border: 6px solid #fff;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(90deg, transparent 0 49px, rgba(255,255,255,0.06) 49px 50px),
    repeating-linear-gradient(0deg, transparent 0 49px, rgba(255,255,255,0.06) 49px 50px);
}
.featured-art::after {

  align-items: center;

  color: rgba(255, 255, 255, 0.92);
  font-weight: bold;
  letter-spacing: -4px;
  text-shadow: 4px 4px 14px rgba(0, 0, 0, 0.35);
} */

/* ===================== FILTERS ===================== */
.filters {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 28px 60px 8px;
}
.chip {
  font-family: Georgia, serif;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 16px;
  border: 1.5px solid var(--navy);
  background: transparent;
  color: var(--navy);
  cursor: pointer;
  transition: all 0.18s ease;
}
.chip:hover {
  background: var(--navy);
  color: #fff;
}
.chip.active {
  background: var(--navy);
  color: var(--gold);
  border-color: var(--navy);
}

/* ===================== STORY GRID ===================== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  padding: 0 60px 60px;
}
.story {
  padding: 32px 28px 32px 0;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.2s ease;
  display: flex;
  flex-direction: column;
  position: relative;
  color: inherit;
  text-decoration: none;
}
.story:nth-child(3n) { border-right: none; padding-right: 0; }
.story:nth-child(3n+1) { padding-left: 0; }
.story:nth-child(3n+2) { padding-left: 28px; padding-right: 28px; }
.story:nth-child(3n+3) { padding-left: 28px; }
.story:hover { background: rgba(201, 169, 97, 0.06); }
.story .num {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 18px;
  font-weight: bold;
}
.story .cat {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.story h4 {
  font-size: 24px;
  line-height: 1.18;
  letter-spacing: -0.3px;
  color: var(--navy);
  margin-bottom: 14px;
  font-weight: normal;
}
.story:hover h4 { color: var(--blue); }
.story .excerpt {
  font-size: 16px;
  color: var(--text-soft);
  margin-bottom: 20px;
  flex: 1;
  font-style: italic;
}
.story .date {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding-top: 14px;
  border-top: 1px solid var(--rule);
}

/* ===================== FOOTER ===================== */
footer {
  background: linear-gradient(135deg, #f5f1e8 0%, #f0e9dd 100%);
  padding: 40px 60px;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  border-top: 1px solid var(--rule);
  letter-spacing: 2px;
  text-transform: uppercase;
}
footer::before {
  content: "✦";
  display: block;
  color: var(--gold);
  font-size: 18px;
  margin-bottom: 12px;
  letter-spacing: 0;
}

/* ===================== EMPTY ===================== */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 0;
  color: var(--muted);
  font-style: italic;
  font-size: 18px;
}

/* ===================== ANIMATIONS ===================== */
@keyframes rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.masthead       { animation: rise 0.7s ease both; }
.logo-mark      { animation: rise 0.7s ease 0.05s both; }
.masthead h1    { animation: rise 0.7s ease 0.10s both; }
.masthead .tagline { animation: rise 0.7s ease 0.18s both; }
nav.primary     { animation: rise 0.7s ease 0.22s both; }
.intro          { animation: rise 0.7s ease 0.28s both; }
.featured       { animation: rise 0.7s ease 0.36s both; }
.story          { animation: rise 0.6s ease both; }
.story:nth-child(1) { animation-delay: 0.42s; }
.story:nth-child(2) { animation-delay: 0.48s; }
.story:nth-child(3) { animation-delay: 0.54s; }
.story:nth-child(4) { animation-delay: 0.60s; }
.story:nth-child(5) { animation-delay: 0.66s; }
.story:nth-child(6) { animation-delay: 0.72s; }

/* ===================== RESPONSIVE ===================== */
@media (max-width: 880px) {
  .wrap { padding: 16px 0; }
  .container { box-shadow: none; }
  .masthead { padding: 40px 24px; }
  .masthead h1 { font-size: 30px; letter-spacing: 2px; }
  .intro { grid-template-columns: 1fr; gap: 16px; padding: 36px 28px; }
  .section-bar { padding: 28px 28px 14px; }
  .featured { grid-template-columns: 1fr; gap: 28px; padding: 32px 28px; }
  .featured-art { order: -1; aspect-ratio: 4 / 3; }
  .filters { padding: 20px 28px 4px; }
  .grid { grid-template-columns: 1fr; padding: 0 28px 40px; }
  .story { border-right: none; padding: 28px 0; }
  .story:nth-child(3n+2), .story:nth-child(3n+3) { padding-left: 0; padding-right: 0; }
  footer { padding: 30px 24px; }
}

</style>
</head>

<body>
<div class="wrap">
  <div class="container">

    <header class="masthead">
      <div class="masthead-top">
        <div class="edition">
          <span id="todayDate"></span>
          <span>Vol. I</span>
        </div>
        <div>Est. 2023</div>
      </div>
      <div class="logo-mark" id="logoMark"></div>
      <h1 id="siteName"></h1>
      <p class="tagline" id="siteTagline"></p>
    </header>

    <nav class="primary" id="primaryNav"></nav>

    <!-- ====== HOME VIEW ====== -->
    <div class="home" id="home">

      <section class="intro">
        <div class="label">From the Editor</div>
        <p id="introText"></p>
      </section>

      <div class="section-bar">
        <h2>The Lead Story</h2>
        <div class="meta">Featured · Pick of the Week</div>
      </div>
      <a class="featured" id="featured" href="#"></a>

      <div class="section-bar">
        <h2>More From the Desk</h2>
        <div class="meta" id="storyCount"></div>
      </div>

      <div class="filters" id="filters"></div>

      <div class="grid" id="grid"></div>

    </div>

    <footer id="footer"></footer>

  </div>
</div>

<script>
/* =====================================================================
   Engine — non-editors can skip this section.
   ===================================================================== */

const S = window.SITE;
const POSTS = window.NEWS_POSTS;

// fill site chrome
document.getElementById('siteName').textContent = S.name;
document.getElementById('siteTagline').textContent = S.description;
document.getElementById('logoMark').textContent = S.initials;
document.getElementById('introText').textContent = S.intro;
document.getElementById('footer').textContent = S.footer;
document.title = S.name;

// today's date in masthead
document.getElementById('todayDate').textContent = new Date()
  .toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

// nav (all menu items link to homepage)
const nav = document.getElementById('primaryNav');
Object.values(S.menu).forEach(label => {
  const a = document.createElement('a');
  a.textContent = label;
  a.href = '.';
  nav.appendChild(a);
});

function escapeHtml(s){ return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// featured
const featured = POSTS.find(p => p.featured) || POSTS[0];
const others   = POSTS.filter(p => p !== featured);

const featuredEl = document.getElementById('featured');
featuredEl.href = 'news/' + encodeURIComponent(featured.file);
featuredEl.innerHTML = `
  <div>
    <div class="stamp">Featured Story</div>
    <div class="cat">${escapeHtml(featured.category)} · ${escapeHtml(featured.date)}</div>
    <h3>${escapeHtml(featured.title)}</h3>
    <p class="excerpt">${escapeHtml(featured.excerpt)}</p>
    <span class="read">Read the story →</span>
  </div>
  <div class="featured-art" data-mark="${escapeHtml(S.initials.charAt(0))}"></div>
`;

// filters
const categories = ['All', ...new Set(others.map(p => p.category))];
const filterRow = document.getElementById('filters');
let activeCat = 'All';
categories.forEach(cat => {
  const b = document.createElement('button');
  b.className = 'chip' + (cat === 'All' ? ' active' : '');
  b.textContent = cat;
  b.onclick = () => {
    activeCat = cat;
    [...filterRow.children].forEach(c => c.classList.remove('active'));
    b.classList.add('active');
    renderGrid();
  };
  filterRow.appendChild(b);
});

// grid
const grid = document.getElementById('grid');
const countEl = document.getElementById('storyCount');
function renderGrid() {
  const list = activeCat === 'All' ? others : others.filter(p => p.category === activeCat);
  countEl.textContent = `${list.length} ${list.length === 1 ? 'Story' : 'Stories'}`;
  if (!list.length) {
    grid.innerHTML = '<div class="empty">Nothing here yet.</div>';
    return;
  }
  grid.innerHTML = list.map((p, i) => `
    <a class="story" href="news/${encodeURIComponent(p.file)}">
      <div class="num">№ ${String(i + 1).padStart(2, '0')}</div>
      <div class="cat">${escapeHtml(p.category)}</div>
      <h4>${escapeHtml(p.title)}</h4>
      <p class="excerpt">${escapeHtml(p.excerpt)}</p>
      <div class="date">${escapeHtml(p.date)}</div>
    </a>
  `).join('');
}
renderGrid();
</script>
</body>
</html>
